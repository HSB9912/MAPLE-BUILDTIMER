<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메이플 빌드 타이머</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f15;--bg2:#141821;--bg3:#1c2230;--brd:#252d3d;
  --t:#e8ecf4;--td:#8892a4;--tm:#5c6678;
  --ac:#5cb8ff;--acg:rgba(92,184,255,0.12);
  --r:#ff6b6b;--g:#51cf66;--y:#ffd43b;--p:#b197fc;--o:#ff922b;--pk:#f783ac;--cy:#3bc9db;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

/* TABS */
.tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--brd);background:#10131a;}
.tab{flex:1;padding:11px;text-align:center;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--tm);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.3px;}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);background:rgba(92,184,255,.04);}
.tab:hover{color:var(--t);}

/* PAGES */
.page{flex:1;display:none;flex-direction:column;overflow:hidden;}
.page.on{display:flex;}

/* ===== BUILD PAGE ===== */
.build-top{flex-shrink:0;padding:12px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--bg);}
.build-top input{background:var(--bg2);border:1px solid var(--brd);color:var(--t);border-radius:8px;padding:7px 12px;font-size:14px;font-family:'Noto Sans KR',sans-serif;flex:1;min-width:150px;}
.build-top input::placeholder{color:var(--tm);}
.build-scroll{flex:1;overflow-y:auto;padding:10px 14px 100px;}
.build-scroll::-webkit-scrollbar{width:4px;}
.build-scroll::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px;}

.b{font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;border:none;border-radius:7px;padding:7px 13px;cursor:pointer;transition:all .15s;letter-spacing:.3px;}
.b:active{transform:scale(.95);}
.b1{background:var(--ac);color:#0c0f15;}
.b2{background:var(--y);color:#0c0f15;}
.b3{background:rgba(255,255,255,.07);color:var(--td);border:1px solid var(--brd);}
.b4{background:rgba(255,107,107,.1);color:var(--r);border:1px solid rgba(255,107,107,.2);}
.b5{background:rgba(81,207,102,.1);color:var(--g);border:1px solid rgba(81,207,102,.2);}
.bsm{padding:4px 8px;font-size:11px;border-radius:5px;}

/* PHASE BLOCK */
.phase-block{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.phase-head{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--brd);cursor:grab;}
.phase-head:active{cursor:grabbing;}
.phase-head input{background:transparent;border:none;color:var(--t);font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;flex:1;outline:none;}
.phase-head input::placeholder{color:var(--tm);}
.phase-head .drag{color:var(--tm);font-size:14px;cursor:grab;}
.phase-body{padding:8px 10px;}

/* STEP ROW */
.step{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;margin-bottom:4px;background:rgba(255,255,255,.02);border:1px solid transparent;transition:background .2s;}
.step:hover{background:rgba(255,255,255,.04);}
.step-time{width:58px;}
.step-time input{width:100%;background:var(--bg);border:1px solid var(--brd);color:var(--ac);border-radius:5px;padding:4px 6px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;text-align:center;}
.step-skills{flex:1;display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
.step-skill{display:flex;align-items:center;gap:2px;border-radius:5px;padding:3px 4px 3px 8px;font-size:11px;font-weight:700;white-space:nowrap;}
.step-skill input{background:transparent;border:none;color:inherit;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;width:auto;outline:none;min-width:30px;}
.step-skill .sk-del{background:none;border:none;color:inherit;opacity:.5;cursor:pointer;font-size:10px;padding:0 2px;}
.step-skill .sk-del:hover{opacity:1;}
.step-note input{background:transparent;border:1px dashed var(--brd);color:var(--y);border-radius:4px;padding:2px 6px;font-size:10px;width:100px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.step-note input::placeholder{color:var(--tm);}
.step-btns{display:flex;gap:3px;flex-shrink:0;}

.add-skill-btn{background:rgba(92,184,255,.08);border:1px dashed rgba(92,184,255,.3);color:var(--ac);border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer;white-space:nowrap;}
.add-skill-btn:hover{background:rgba(92,184,255,.15);}

.add-step{padding:6px;text-align:center;}

/* COLOR PICKER */
.color-sel{position:relative;}
.color-dot{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.15);flex-shrink:0;}
.color-pop{position:absolute;top:24px;left:0;background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:6px;display:none;flex-wrap:wrap;gap:4px;z-index:20;width:120px;}
.color-pop.show{display:flex;}
.color-opt{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border .15s;}
.color-opt:hover{border-color:white;}

/* IMPORT/EXPORT */
.io-bar{flex-shrink:0;padding:8px 14px;border-top:1px solid var(--brd);background:var(--bg);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.io-bar .info{font-size:11px;color:var(--tm);margin-right:auto;}

/* ===== TIMER PAGE ===== */
.timer-top{flex-shrink:0;background:linear-gradient(180deg,#10131a 0%,var(--bg) 100%);border-bottom:1px solid var(--brd);padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:10;}
.timer-sec{text-align:center;}
.ph{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--tm);font-family:'Outfit',sans-serif;margin-bottom:2px;}
.ph.on{color:var(--ac);}
.td{font-family:'JetBrains Mono',monospace;font-size:56px;font-weight:700;color:var(--ac);line-height:1;min-width:120px;text-shadow:0 0 30px rgba(92,184,255,0.25);letter-spacing:-1px;}
.td.pre{color:var(--y);text-shadow:0 0 30px rgba(255,212,59,0.25);}
.td.setup{color:var(--cy);}
.td.end{color:var(--r);text-shadow:0 0 30px rgba(255,107,107,0.25);}

.ctrls{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

.tadj{flex-shrink:0;background:rgba(255,255,255,.015);border-bottom:1px solid var(--brd);padding:5px 14px;display:flex;align-items:center;justify-content:center;gap:3px;}
.tadj-btn{background:var(--bg2);border:1px solid var(--brd);border-radius:5px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
.tadj-btn:active{transform:scale(.92);}
.tadj-btn.minus{color:#ff8787;border-color:rgba(255,107,107,.2);}
.tadj-btn.minus:hover{background:rgba(255,107,107,.08);border-color:rgba(255,107,107,.4);}
.tadj-btn.plus{color:#69db7c;border-color:rgba(81,207,102,.2);}
.tadj-btn.plus:hover{background:rgba(81,207,102,.08);border-color:rgba(81,207,102,.4);}
.tadj-lbl{font-size:9px;color:var(--tm);font-family:'Outfit',sans-serif;font-weight:700;margin:0 4px;}

.sbar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--brd);padding:6px 14px;display:flex;align-items:center;gap:10px;font-size:11px;overflow-x:auto;}
.sbar label{display:flex;align-items:center;gap:4px;color:var(--td);cursor:pointer;white-space:nowrap;}
.sbar input[type=checkbox]{accent-color:var(--ac);width:13px;height:13px;}
.sbar .vol{width:50px;accent-color:var(--ac);}
.sbar select{background:var(--bg);border:1px solid var(--brd);color:var(--t);border-radius:5px;padding:2px 4px;font-size:10px;max-width:140px;}
.sbar .test-btn{background:rgba(92,184,255,.1);border:1px solid rgba(92,184,255,.25);color:var(--ac);border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;white-space:nowrap;}

.pg-w{flex-shrink:0;height:3px;background:rgba(255,255,255,.03);}
.pg-b{height:100%;background:linear-gradient(90deg,var(--ac),var(--p));width:0%;transition:width .3s linear;border-radius:0 2px 2px 0;}

.origin-bar{flex-shrink:0;background:rgba(255,146,43,.04);border-bottom:1px solid rgba(255,146,43,.15);padding:6px 14px;}
.origin-inner{display:flex;align-items:center;gap:8px;}
.origin-icon{font-size:14px;}
.origin-label{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;color:var(--o);letter-spacing:.3px;}
.origin-cd{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--o);min-width:50px;text-shadow:0 0 12px rgba(255,146,43,.2);}
.origin-pg{flex:1;height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;}
.origin-pg-b{height:100%;background:linear-gradient(90deg,var(--o),var(--y));width:0%;transition:width .5s linear;border-radius:2px;}
.origin-btn{background:rgba(255,146,43,.1);border:1px solid rgba(255,146,43,.25);color:var(--o);border-radius:5px;padding:3px 8px;font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;cursor:pointer;}
.origin-btn:hover{background:rgba(255,146,43,.2);}
.origin-btn.origin-reset{color:var(--td);border-color:var(--brd);background:rgba(255,255,255,.04);}
.origin-btn.running{background:rgba(255,212,59,.12);color:var(--y);border-color:rgba(255,212,59,.3);}

.tl-w{flex:1;overflow-y:auto;padding:8px 12px 100px;scroll-behavior:smooth;}
.tl-w::-webkit-scrollbar{width:3px;}
.tl-w::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px;}

.sdv{display:flex;align-items:center;gap:8px;padding:14px 4px 6px;font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:1.5px;}
.sdv::after{content:'';flex:1;height:1px;background:var(--brd);}

.tl{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:3px;border:1px solid transparent;transition:all .25s;}
.tl.active{background:rgba(92,184,255,.06);border-color:rgba(92,184,255,.35);box-shadow:0 0 20px rgba(92,184,255,.08),inset 0 0 20px rgba(92,184,255,.04);transform:scale(1.01);}
.tl.active .tt{color:var(--ac);}
.tl.done{opacity:.25;}
.tl.upcoming{opacity:.55;}

.tt{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--td);min-width:48px;text-align:right;flex-shrink:0;}
.ts{display:flex;flex-wrap:wrap;align-items:center;gap:5px;flex:1;}
.sk{display:inline-flex;font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;letter-spacing:.2px;}
.aw{color:var(--tm);font-size:11px;}
.tn{font-size:10px;color:var(--y);padding-left:58px;margin-bottom:3px;font-weight:500;}

.nb{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 65%,transparent);padding:30px 14px 12px;z-index:5;display:none;}
.nb.on{display:block;}
.ni{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(8px);}
.nl{font-family:'Outfit',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tm);}
.ns{display:flex;flex-wrap:wrap;gap:4px;}
.nt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--ac);margin-left:auto;}

/* KEYBIND MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-bg.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;width:90%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-head{padding:12px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;}
.modal-head h2{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--td);font-size:18px;cursor:pointer;}
.modal-body{flex:1;overflow-y:auto;padding:12px 16px;}
.modal-foot{padding:10px 16px;border-top:1px solid var(--brd);display:flex;gap:8px;justify-content:flex-end;}
.kb-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.kb-label{font-size:13px;color:var(--t);min-width:100px;}
.kb-btn{background:var(--bg);border:1px solid var(--brd);color:var(--ac);border-radius:6px;padding:5px 12px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;min-width:80px;text-align:center;}
.kb-btn.rec{border-color:var(--r);color:var(--r);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--tm);}
.empty h3{font-family:'Outfit',sans-serif;font-size:18px;color:var(--td);margin-bottom:8px;}
.empty p{font-size:13px;line-height:1.6;}

@media(max-width:500px){
  .td{font-size:40px;min-width:90px;}
  .b{padding:5px 10px;font-size:11px;}
}
</style>
</head>
<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab on" onclick="switchTab('build')">📝 빌드 편집</div>
  <div class="tab" onclick="switchTab('timer')">⏱️ 타이머</div>
</div>

<!-- ===== BUILD PAGE ===== -->
<div class="page on" id="pageBuild">
  <div class="build-top">
    <select id="buildPresetSelect" onchange="selectPreset(this.value);renderBuild();" style="background:var(--bg2);border:1px solid var(--brd);color:var(--y);border-radius:6px;padding:5px 8px;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;">
      <option value="custom">📝 내 빌드</option>
      <option value="p0">🔥 극딜+준극 (0쿨뚝/메르250)</option>
      <option value="p2">🔥 극딜+준극 (2쿨뚝/메르250)</option>
      <option value="p5">🔥 극딜+준극 (5쿨뚝/메르250)</option>
      <option value="boost">🚀 부스트콜 (110초)</option>
    </select>
    <input id="buildName" placeholder="빌드 이름 (예: 에반 수로, 아크 극딜...)" spellcheck="false">
    <button class="b b5" onclick="addPhase()">+ 구간 추가</button>
    <button class="b b3" onclick="openKeys()">⌨️ 단축키</button>
  </div>
  <div class="build-scroll" id="buildScroll">
    <div class="empty" id="emptyState">
      <h3>🎮 빌드 타이머</h3>
      <p>수로, 극딜 등 어떤 빌드든 직접 만들 수 있어요.<br>
      <b>"+ 구간 추가"</b>로 시작하세요!<br><br>
      극딜용: 사이클을 구간으로 만들고 단축키로 리셋+시작<br>
      수로용: 입장 전 → 입장 후 → 본 타이머 구간 세팅</p>
    </div>
  </div>
  <div class="io-bar">
    <span class="info">💾 빌드는 브라우저에 자동 저장됩니다</span>
    <button class="b b3 bsm" onclick="exportBuild()">📤 내보내기</button>
    <button class="b b3 bsm" onclick="importBuild()">📥 가져오기</button>
    <button class="b b4 bsm" onclick="clearAll()">🗑️ 전체 삭제</button>
  </div>
</div>

<!-- ===== TIMER PAGE ===== -->
<div class="page" id="pageTimer">
  <div class="timer-top">
    <div class="timer-sec">
      <div class="ph" id="phLabel">준비</div>
      <div class="td" id="timerD">--</div>
    </div>
    <div class="ctrls">
      <select id="presetSelect" onchange="selectPreset(this.value)" style="background:var(--bg);border:1px solid var(--brd);color:var(--y);border-radius:6px;padding:5px 8px;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;max-width:160px;">
        <option value="custom">📝 내 빌드</option>
        <option value="p0">🔥 극딜+준극 (0쿨뚝)</option>
        <option value="p2">🔥 극딜+준극 (2쿨뚝)</option>
        <option value="p5">🔥 극딜+준극 (5쿨뚝)</option>
        <option value="boost">🚀 부스트콜 (110초)</option>
      </select>
      <button class="b b1" id="btnS" onclick="toggle()">시작</button>
      <button class="b b3" onclick="resetTimer()">리셋</button>
      <input type="number" id="startDelaySec" min="1" max="60" value="5" style="width:36px;background:var(--bg);border:1px solid var(--brd);color:var(--y);border-radius:5px;padding:4px;font-family:'JetBrains Mono',monospace;font-size:11px;text-align:center;">
      <button class="b" style="background:rgba(255,212,59,.1);color:var(--y);border:1px solid rgba(255,212,59,.25);" onclick="delayedStart()">⏳ 초 후</button>
      <button class="b" style="background:rgba(177,151,252,.15);color:var(--p);border:1px solid rgba(177,151,252,.25);" onclick="openPip()">⧉ PIP</button>
    </div>
  </div>
  <div class="tadj" id="tadjBar">
    <button class="tadj-btn minus" onclick="adjTime(-10)">-10</button>
    <button class="tadj-btn minus" onclick="adjTime(-5)">-5</button>
    <button class="tadj-btn minus" onclick="adjTime(-3)">-3</button>
    <button class="tadj-btn minus" onclick="adjTime(-1)">-1</button>
    <span class="tadj-lbl">⏱️</span>
    <button class="tadj-btn plus" onclick="adjTime(1)">+1</button>
    <button class="tadj-btn plus" onclick="adjTime(3)">+3</button>
    <button class="tadj-btn plus" onclick="adjTime(5)">+5</button>
    <button class="tadj-btn plus" onclick="adjTime(10)">+10</button>
  </div>
  <div class="sbar">
    <label><input type="checkbox" id="chkBeep" checked> 🔔 비프</label>
    <input type="range" class="vol" id="volBeep" min="0" max="100" value="50">
    <label><input type="checkbox" id="chkTts" checked> 🗣️ 음성</label>
    <input type="range" class="vol" id="volTts" min="0" max="100" value="80">
    <select id="voiceSelect"></select>
    <button class="test-btn" onclick="testVoice()">테스트</button>
    <label><span style="color:var(--td)">속도</span><input type="range" class="vol" id="ttsRate" min="50" max="300" value="160"></label>
    <label><input type="checkbox" id="chkPreTts"> 📢 2초전</label>
    <label><input type="checkbox" id="chkLoop"> 🔄 자동 루프</label>
    <span style="color:var(--brd);">|</span>
    <label><span style="color:var(--td)">지연</span><input type="number" id="delayVal" min="0" max="30" step="0.5" value="0" style="width:40px;background:var(--bg);border:1px solid var(--brd);color:var(--y);border-radius:4px;padding:2px 4px;font-family:'JetBrains Mono',monospace;font-size:11px;text-align:center;" onchange="applyDelay()"><span style="color:var(--td)">초</span></label>
  </div>
  <div class="origin-bar" id="originBar" style="display:none;">
    <div class="origin-inner">
      <span class="origin-icon">🌟</span>
      <span class="origin-label">오리진</span>
      <span class="origin-cd" id="originCd">--</span>
      <div class="origin-pg"><div class="origin-pg-b" id="originPgB"></div></div>
      <button class="origin-btn" id="originBtn" onclick="toggleOrigin()">시작</button>
      <button class="origin-btn origin-reset" onclick="resetOrigin()">리셋</button>
    </div>
  </div>
  <div class="pg-w"><div class="pg-b" id="pgBar"></div></div>
  <div class="tl-w" id="tlWrap"></div>
  <div class="nb" id="nextBar"><div class="ni"><div class="nl">NEXT</div><div class="ns" id="nextSk"></div><div class="nt" id="nextTm"></div></div></div>
</div>

<!-- KEYBIND MODAL -->
<div class="modal-bg" id="keysModal">
  <div class="modal">
    <div class="modal-head"><h2>⌨️ 단축키 설정</h2><button class="modal-close" onclick="closeKeys()">✕</button></div>
    <div class="modal-body" id="keysBody"></div>
    <div class="modal-foot"><button class="b b1" onclick="closeKeys()">확인</button></div>
  </div>
</div>

<script>
// ===== SKILL COLORS =====
const COLORS=[
  {id:'blue',c:'#74b9ff',bg:'rgba(116,185,255,.15)'},
  {id:'purple',c:'#b197fc',bg:'rgba(177,151,252,.15)'},
  {id:'orange',c:'#ff922b',bg:'rgba(255,146,43,.12)'},
  {id:'cyan',c:'#3bc9db',bg:'rgba(59,201,219,.12)'},
  {id:'red',c:'#ff6b6b',bg:'rgba(255,107,107,.12)'},
  {id:'green',c:'#51cf66',bg:'rgba(81,207,102,.12)'},
  {id:'pink',c:'#f783ac',bg:'rgba(247,131,172,.12)'},
  {id:'yellow',c:'#ffd43b',bg:'rgba(255,212,59,.12)'},
  {id:'sky',c:'#66d9e8',bg:'rgba(102,217,232,.12)'},
  {id:'coral',c:'#ff8787',bg:'rgba(255,135,135,.12)'},
  {id:'gray',c:'#868e96',bg:'rgba(255,255,255,.06)'},
];
function getColor(id){return COLORS.find(c=>c.id===id)||COLORS[10];}

// ===== BUILD DATA =====
// phases: [{name, icon, mode:'countdown'|'countup', duration, steps:[{t, skills:[{name,color}], note}]}]
let buildName='';
let phases=[];

function save(){
  if(activePreset==='custom'){
    try{localStorage.setItem('build_data',JSON.stringify({name:buildName,phases}));}catch(e){}
  }
  updateEmpty();
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('build_data'));
    if(d){buildName=d.name||'';phases=d.phases||[];}
  }catch(e){}
}

// ===== BUILD UI =====
function updateEmpty(){
  document.getElementById('emptyState').style.display=phases.length?'none':'block';
}

function renderBuild(){
  document.getElementById('buildName').value=buildName;
  const wrap=document.getElementById('buildScroll');
  // Keep empty state
  let html='<div class="empty" id="emptyState" style="display:'+(phases.length?'none':'block')+'"><h3>🎮 빌드 타이머</h3><p>수로, 극딜 등 어떤 빌드든 직접 만들 수 있어요.<br><b>"+ 구간 추가"</b>로 시작하세요!</p></div>';

  phases.forEach((ph,pi)=>{
    html+=`<div class="phase-block" data-pi="${pi}">
      <div class="phase-head">
        <span class="drag">⠿</span>
        <input value="${esc(ph.name)}" placeholder="구간 이름" onchange="phases[${pi}].name=this.value;save();" spellcheck="false">
        <select onchange="phases[${pi}].mode=this.value;save();" style="background:var(--bg);border:1px solid var(--brd);color:var(--ac);border-radius:5px;padding:3px 6px;font-size:11px;">
          <option value="countdown" ${ph.mode==='countdown'?'selected':''}>⬇️ 카운트다운</option>
          <option value="countup" ${ph.mode==='countup'?'selected':''}>⬆️ 카운트업</option>
        </select>
        <input type="number" value="${ph.duration}" min="0.1" max="600" step="0.1" style="width:55px;background:var(--bg);border:1px solid var(--brd);color:var(--y);border-radius:5px;padding:3px 6px;font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center;" onchange="phases[${pi}].duration=+this.value;save();" title="구간 길이(초)">
        <span style="font-size:10px;color:var(--tm);">초</span>
        <button class="b b4 bsm" onclick="removePhase(${pi})">삭제</button>
      </div>
      <div class="phase-body">`;

    ph.steps.forEach((st,si)=>{
      const col=getColor(st.skills[0]?.color||'gray');
      html+=`<div class="step">
        <div class="step-time"><input type="number" value="${st.t}" min="0" max="999" step="0.1" onchange="phases[${pi}].steps[${si}].t=+this.value;save();"></div>
        <div class="step-skills">`;
      st.skills.forEach((sk,ki)=>{
        const c=getColor(sk.color);
        html+=`<span class="step-skill" style="background:${c.bg};color:${c.c};">
          <div class="color-sel">
            <div class="color-dot" style="background:${c.c};" onclick="toggleColorPop(this)"></div>
            <div class="color-pop">${COLORS.map(cc=>`<div class="color-opt" style="background:${cc.c};" onclick="setSkillColor(${pi},${si},${ki},'${cc.id}')"></div>`).join('')}</div>
          </div>
          <input value="${esc(sk.name)}" onchange="phases[${pi}].steps[${si}].skills[${ki}].name=this.value;save();" spellcheck="false" style="width:${Math.max(30,sk.name.length*8)}px;">
          <button class="sk-del" onclick="removeSkill(${pi},${si},${ki})">✕</button>
        </span>`;
      });
      html+=`<button class="add-skill-btn" onclick="addSkill(${pi},${si})">+스킬</button></div>
        <div class="step-note"><input placeholder="메모" value="${esc(st.note||'')}" onchange="phases[${pi}].steps[${si}].note=this.value;save();" spellcheck="false"></div>
        <div class="step-btns"><button class="b b4 bsm" onclick="removeStep(${pi},${si})">✕</button></div>
      </div>`;
    });

    html+=`<div class="add-step"><button class="b b5 bsm" onclick="addStep(${pi})">+ 스킬 타이밍 추가</button></div>
      </div></div>`;
  });
  wrap.innerHTML=html;
}

function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function addPhase(){
  phases.push({name:'',icon:'',mode:'countdown',duration:120,steps:[]});
  save();renderBuild();
}
function removePhase(pi){
  if(!confirm('이 구간을 삭제할까요?'))return;
  phases.splice(pi,1);save();renderBuild();
}
function addStep(pi){
  const lastT=phases[pi].steps.length?phases[pi].steps[phases[pi].steps.length-1].t:phases[pi].duration;
  phases[pi].steps.push({t:Math.max(0,lastT-10),skills:[{name:'스킬명',color:'blue'}],note:''});
  save();renderBuild();
}
function removeStep(pi,si){
  phases[pi].steps.splice(si,1);save();renderBuild();
}
function addSkill(pi,si){
  phases[pi].steps[si].skills.push({name:'스킬명',color:'gray'});
  save();renderBuild();
}
function removeSkill(pi,si,ki){
  if(phases[pi].steps[si].skills.length<=1)return;
  phases[pi].steps[si].skills.splice(ki,1);save();renderBuild();
}
function setSkillColor(pi,si,ki,colorId){
  phases[pi].steps[si].skills[ki].color=colorId;
  save();renderBuild();
  document.querySelectorAll('.color-pop').forEach(p=>p.classList.remove('show'));
}
function toggleColorPop(dot){
  const pop=dot.nextElementSibling;
  document.querySelectorAll('.color-pop').forEach(p=>{if(p!==pop)p.classList.remove('show');});
  pop.classList.toggle('show');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.color-sel'))document.querySelectorAll('.color-pop').forEach(p=>p.classList.remove('show'));
});

document.getElementById('buildName').addEventListener('input',function(){buildName=this.value;save();});

// IMPORT/EXPORT
function exportBuild(){
  const data=JSON.stringify({name:buildName,phases},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${buildName||'빌드'}.json`;
  a.click();
}
function importBuild(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        buildName=d.name||'';phases=d.phases||[];
        save();renderBuild();
        alert('빌드를 불러왔습니다!');
      }catch(err){alert('파일 형식이 올바르지 않습니다.');}
    };
    r.readAsText(f);
  };
  input.click();
}
function clearAll(){
  if(!confirm('전체 빌드를 삭제할까요?'))return;
  buildName='';phases=[];save();renderBuild();
}

// ===== TABS =====
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===(tab==='build'?0:1)));
  document.getElementById('pageBuild').classList.toggle('on',tab==='build');
  document.getElementById('pageTimer').classList.toggle('on',tab==='timer');
  if(tab==='timer'){
    document.getElementById('presetSelect').value=activePreset;
    buildTimerView();
  }
}

// ===== TIMER =====
let iv=null,tMs=0,running=false,firedSet=new Set(),pipWin=null,startRef=0;
let flatSteps=[]; // flattened for timer: [{elapsed,skills:[{name,color}],note,phaseName}]
let totalDur=0;

function buildTimerView(){
  // Flatten phases into absolute elapsed timeline
  flatSteps=[];
  let elapsed=0;
  phases.forEach(ph=>{
    ph.steps.forEach(st=>{
      let absE;
      if(ph.mode==='countdown') absE=elapsed+(ph.duration-st.t);
      else absE=elapsed+st.t;
      flatSteps.push({elapsed:absE,skills:st.skills,note:st.note,phaseName:ph.name,phaseStart:elapsed,phaseDur:ph.duration});
    });
    elapsed+=ph.duration;
  });
  totalDur=elapsed;
  flatSteps.sort((a,b)=>a.elapsed-b.elapsed);
  renderTimerList();
  updateTimer();
}

function renderTimerList(){
  const w=document.getElementById('tlWrap');
  if(!flatSteps.length){w.innerHTML='<div class="empty"><h3>빌드가 비어있어요</h3><p>편집 탭에서 구간과 스킬을 추가하세요.</p></div>';return;}
  let html='',lastPh='';
  flatSteps.forEach((st,i)=>{
    if(st.phaseName!==lastPh){html+=`<div class="sdv">${st.phaseName||'구간'}</div>`;lastPh=st.phaseName;}
    const sk=st.skills.map(s=>{const c=getColor(s.color);return `<span class="sk" style="background:${c.bg};color:${c.c};">${s.name}</span>`;}).join('<span class="aw">→</span>');
    const nt=st.note?`<div class="tn">${st.note}</div>`:'';
    // Show phase-relative time
    const relT=st.elapsed-st.phaseStart;
    const pDur=st.phaseDur;
    const remaining=pDur-relT;
    const timeStr=remaining<10?remaining.toFixed(1)+'s':Math.round(remaining)+'s';
    html+=`<div class="tl upcoming" id="ts-${i}"><div class="tt">${timeStr}</div><div class="ts">${sk}</div></div>${nt}`;
  });
  w.innerHTML=html;
}

function renderPipList(doc){
  const b=doc.getElementById('pipBd');if(!b)return;
  let html='',lastPh='';
  flatSteps.forEach((st,i)=>{
    if(st.phaseName!==lastPh){html+=`<div class="psd">${st.phaseName||'구간'}</div>`;lastPh=st.phaseName;}
    const sk=st.skills.map(s=>{const c=getColor(s.color);return `<span class="ps" style="background:${c.bg};color:${c.c};font-size:10px;">${s.name}</span>`;}).join('');
    const nt=st.note?`<div class="pn">${st.note}</div>`:'';
    const relT=st.elapsed-st.phaseStart;const remaining=st.phaseDur-relT;
    const timeStr=remaining<10?remaining.toFixed(1)+'s':Math.round(remaining)+'s';
    html+=`<div class="pr upcoming" id="p-ts-${i}"><div class="pt2">${timeStr}</div><div class="psk">${sk}</div></div>${nt}`;
  });
  b.innerHTML=html;
}

function updateTimer(){
  const e=tMs/1000;
  updateTimerDoc(document,e,false);
  if(pipWin&&!pipWin.closed)updateTimerDoc(pipWin.document,e,true);
  fireAudio(e);
}

function updateTimerDoc(doc,e,pip){
  const tEl=doc.getElementById(pip?'pipTm':'timerD');
  const pEl=doc.getElementById(pip?'pipPh':'phLabel');
  const gEl=doc.getElementById(pip?'pipPg':'pgBar');
  if(!tEl)return;

  // Find current phase
  let cum=0,curPh=null;
  for(const ph of phases){
    if(e<cum+ph.duration){curPh={name:ph.name,mode:ph.mode,dur:ph.duration,start:cum,localE:e-cum};break;}
    cum+=ph.duration;
  }

  tEl.className=pip?'pt':'td';
  if(!curPh||e>=totalDur){
    tEl.textContent='0';tEl.classList.add('end');
    pEl.textContent='종료';pEl.className=pip?'pp':'ph';
  } else {
    const raw=curPh.mode==='countdown'?curPh.dur-curPh.localE:curPh.localE;
    const disp=raw<10?Math.max(0,raw).toFixed(1):Math.ceil(Math.max(0,raw));
    tEl.textContent=disp;
    pEl.textContent=curPh.name||'진행중';
    pEl.className=(pip?'pp':'ph')+' on';
  }
  if(gEl)gEl.style.width=Math.min(100,(e/Math.max(1,totalDur))*100)+'%';

  // Highlight
  let ae=null;const px=pip?'p-':'';
  flatSteps.forEach((st,i)=>{
    const el=doc.getElementById(`${px}ts-${i}`);if(!el)return;
    el.className=pip?'pr':'tl';
    if(e<st.elapsed-0.5)el.classList.add('upcoming');
    else if(e<st.elapsed+4){el.classList.add('active');ae=el;}
    else el.classList.add('done');
  });
  if(ae&&running)ae.scrollIntoView({behavior:'smooth',block:'center'});

  // Next
  const bar=doc.getElementById(pip?'pipNx':'nextBar');
  const nsk=doc.getElementById(pip?'pipNxSk':'nextSk');
  const ntm=doc.getElementById(pip?'pipNxTm':'nextTm');
  if(!bar)return;
  if(!running){bar.classList.remove('on');return;}
  let ns=null,su=0;
  for(const st of flatSteps){if(e<st.elapsed-0.5){ns=st;su=st.elapsed-e;break;}}
  if(ns){
    bar.classList.add('on');
    nsk.innerHTML=ns.skills.map(s=>{const c=getColor(s.color);return `<span class="${pip?'ps':'sk'}" style="background:${c.bg};color:${c.c};font-size:${pip?9:11}px;">${s.name}</span>`;}).join('');
    ntm.textContent=su<10?su.toFixed(1)+'초 후':Math.ceil(su)+'초 후';
  } else bar.classList.remove('on');
}

// ===== AUDIO =====
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=880,dur=0.08){
  if(!document.getElementById('chkBeep').checked)return;
  const vol=document.getElementById('volBeep').value/100;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.frequency.value=freq;o.type='sine';
  g.gain.setValueAtTime(vol*0.3,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function speak(text){
  if(!document.getElementById('chkTts').checked)return;
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.rate=document.getElementById('ttsRate').value/100;u.pitch=1.0;
  u.volume=document.getElementById('volTts').value/100;
  const sel=document.getElementById('voiceSelect');
  const voices=speechSynthesis.getVoices();
  if(sel.value){const ch=voices.find(v=>v.voiceURI===sel.value);if(ch)u.voice=ch;}
  speechSynthesis.speak(u);
}
function testVoice(){audioCtx.resume();speak('프리드 3스택, 준비');}
function loadVoices(){
  const sel=document.getElementById('voiceSelect');
  const voices=speechSynthesis.getVoices();
  const saved=localStorage.getItem('build_voice')||'';
  sel.innerHTML='';
  const ko=voices.filter(v=>v.lang.startsWith('ko'));
  const others=voices.filter(v=>!v.lang.startsWith('ko'));
  if(ko.length){const og=document.createElement('optgroup');og.label='🇰🇷 한국어';ko.forEach(v=>{const o=document.createElement('option');o.value=v.voiceURI;o.textContent=v.name;if(v.voiceURI===saved)o.selected=true;og.appendChild(o);});sel.appendChild(og);}
  if(others.length){const og=document.createElement('optgroup');og.label='기타';others.forEach(v=>{const o=document.createElement('option');o.value=v.voiceURI;o.textContent=`${v.name} (${v.lang})`;if(v.voiceURI===saved)o.selected=true;og.appendChild(o);});sel.appendChild(og);}
  if(!saved&&ko.length)sel.value=ko[0].voiceURI;
}
document.getElementById('voiceSelect').addEventListener('change',function(){try{localStorage.setItem('build_voice',this.value);}catch(e){}});

function fireAudio(e){
  if(!running)return;
  flatSteps.forEach((st,i)=>{
    const key=`s-${i}`;
    if(!firedSet.has(key)&&e>=st.elapsed-0.15&&e<st.elapsed+1){
      firedSet.add(key);beep(880,0.1);
      speak(st.skills.map(s=>s.name).join(', '));
    }
    const pk=`p-${i}`;
    if(document.getElementById('chkPreTts').checked&&!firedSet.has(pk)&&e>=st.elapsed-2.15&&e<st.elapsed-1){
      firedSet.add(pk);beep(440,0.05);speak('준비, '+st.skills.map(s=>s.name).join(', '));
    }
  });
}

// ===== CONTROLS =====
function toggle(){
  audioCtx.resume();
  if(!flatSteps.length){buildTimerView();}
  if(running){
    clearInterval(iv);running=false;
    document.getElementById('btnS').textContent='재개';document.getElementById('btnS').className='b b1';
  } else {
    running=true;
    document.getElementById('btnS').textContent='일시정지';document.getElementById('btnS').className='b b2';
    // Auto-start origin if not running
    if(!originRunning){toggleOrigin();}
    startRef=performance.now()-tMs;
    iv=setInterval(()=>{
      tMs=performance.now()-startRef;
      if(tMs>=totalDur*1000){
        if(document.getElementById('chkLoop').checked){
          clearInterval(iv);running=false;tMs=0;firedSet.clear();speechSynthesis?.cancel();
          document.getElementById('btnS').textContent='시작';document.getElementById('btnS').className='b b1';document.getElementById('btnS').disabled=false;
          buildTimerView();
          setTimeout(()=>toggle(),50);
          return;
        }
        tMs=totalDur*1000;clearInterval(iv);running=false;document.getElementById('btnS').textContent='완료';document.getElementById('btnS').disabled=true;
      }
      updateTimer();
    },100);
  }
}

// Delayed start
function delayedStart(){
  const sec=parseInt(document.getElementById('startDelaySec').value)||5;
  let remain=sec;
  document.getElementById('btnS').disabled=true;
  document.getElementById('btnS').textContent=remain+'초 후 시작';
  document.getElementById('btnS').className='b b2';
  const ci=setInterval(()=>{
    remain--;
    if(remain<=0){
      clearInterval(ci);
      document.getElementById('btnS').disabled=false;
      toggle();
    } else {
      document.getElementById('btnS').textContent=remain+'초 후 시작';
      if(remain<=3)beep(440,0.05);
    }
  },1000);
  beep(440,0.05);
}
function resetTimer(){
  clearInterval(iv);running=false;tMs=0;firedSet.clear();
  speechSynthesis?.cancel();
  document.getElementById('btnS').textContent='시작';document.getElementById('btnS').className='b b1';document.getElementById('btnS').disabled=false;
  buildTimerView();
}

function adjTime(sec){
  tMs=Math.max(0,Math.min(totalDur*1000,tMs+sec*1000));
  if(running) startRef=performance.now()-tMs;
  // Re-check fired steps
  firedSet.clear();
  const e=tMs/1000;
  flatSteps.forEach((st,i)=>{
    if(e>=st.elapsed+1)firedSet.add(`s-${i}`);
    if(e>=st.elapsed-1)firedSet.add(`p-${i}`);
  });
  updateTimer();
}

// ===== KEYBINDS =====
let binds={toggle:'Space',reset:'KeyR',pip:'KeyP',quickRestart:'none'};
try{const s=localStorage.getItem('build_binds');if(s)binds=JSON.parse(s);}catch(e){}
let recKey=null;

function quickRestart(){
  clearInterval(iv);running=false;tMs=0;firedSet.clear();
  speechSynthesis?.cancel();
  document.getElementById('btnS').textContent='시작';document.getElementById('btnS').className='b b1';document.getElementById('btnS').disabled=false;
  buildTimerView();
  // auto start
  setTimeout(()=>toggle(),50);
}

document.addEventListener('keydown',e=>{
  if(recKey){
    e.preventDefault();
    if(e.code==='Escape'){binds[recKey]='none';}
    else if(e.code==='Delete'||e.code==='Backspace'){binds[recKey]='none';}
    else{binds[recKey]=e.code;}
    try{localStorage.setItem('build_binds',JSON.stringify(binds));}catch(x){}
    recKey=null;renderKeysModal();return;
  }
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(binds.toggle!=='none'&&e.code===binds.toggle){e.preventDefault();toggle();}
  if(binds.reset!=='none'&&e.code===binds.reset){e.preventDefault();resetTimer();}
  if(binds.pip!=='none'&&e.code===binds.pip){e.preventDefault();openPip();}
  if(binds.quickRestart!=='none'&&e.code===binds.quickRestart){e.preventDefault();quickRestart();}
});
function openKeys(){renderKeysModal();document.getElementById('keysModal').classList.add('show');}
function closeKeys(){recKey=null;document.getElementById('keysModal').classList.remove('show');}
function renderKeysModal(){
  const labels={toggle:'시작/정지',reset:'리셋',quickRestart:'리셋+자동시작 (극딜용)',pip:'PIP'};
  let h='<div style="font-size:11px;color:#475569;padding:0 0 10px;">Esc 또는 Delete = 미설정으로 변경</div>';
  for(const[k,l] of Object.entries(labels)){
    const d=formatKey(binds[k]),isR=recKey===k;
    h+=`<div class="kb-row"><div class="kb-label">${l}</div><button class="kb-btn ${isR?'rec':''}" onclick="recKey='${k}';renderKeysModal();">${isR?'키 입력...':d}</button></div>`;
  }
  document.getElementById('keysBody').innerHTML=h;
}
function formatKey(c){if(c==='none')return '미설정';const m={'Space':'스페이스','KeyR':'R','KeyP':'P','Enter':'Enter','Escape':'Esc'};if(m[c])return m[c];if(c.startsWith('Key'))return c.slice(3);if(c.startsWith('Digit'))return c.slice(5);return c;}

// ===== PIP =====
async function openPip(){
  if('documentPictureInPicture' in window){
    try{
      pipWin=await documentPictureInPicture.requestWindow({width:300,height:460});
      const fl=pipWin.document.createElement('link');fl.href='https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap';fl.rel='stylesheet';pipWin.document.head.appendChild(fl);
      pipWin.document.body.appendChild(document.getElementById('pipTpl').content.cloneNode(true));
      pipWin.adjTime=adjTime;
      renderPipList(pipWin.document);updateTimer();
      pipWin.addEventListener('pagehide',()=>{pipWin=null;});return;
    }catch(e){}
  }
  const w=300,h=460;
  pipWin=window.open('','build_pip',`width=${w},height=${h},left=${screen.width-w-20},top=60,toolbar=no,menubar=no`);
  if(!pipWin){alert('팝업 허용 필요');return;}
  pipWin.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">');
  const tpl=document.getElementById('pipTpl'),d=document.createElement('div');d.appendChild(tpl.content.cloneNode(true));
  const sty=d.querySelector('style').outerHTML;d.querySelector('style').remove();
  pipWin.document.write(sty+'</head><body>'+d.innerHTML+'</body></html>');pipWin.document.close();
  setTimeout(()=>{renderPipList(pipWin.document);updateTimer();},300);
  setInterval(()=>{if(!pipWin||pipWin.closed)pipWin=null;},1000);
}

// ===== DELAY =====
function applyDelay(){
  const d=parseFloat(document.getElementById('delayVal').value)||0;
  try{localStorage.setItem('build_delay',d);}catch(e){}
  // Recalculate preset durations with delay
  if(activePreset!=='custom'){
    const p=PRESET_DATA[activePreset];
    if(p){
      phases=JSON.parse(JSON.stringify(p.phases));
      phases.forEach(ph=>{ph.duration=ph.duration+d;});
      buildTimerView();
    }
  }
}
try{const sd=localStorage.getItem('build_delay');if(sd)document.getElementById('delayVal').value=sd;}catch(e){}

// ===== ORIGIN TRACKER =====
let originCd=338.4; // default 0쿨뚝
let originMs=0,originRunning=false,originIv=null,originStartRef=0;

const ORIGIN_CD={p0:338.4,p2:336.4,p5:333.4,boost:338.4,custom:338.4};

function getOriginCd(){
  return ORIGIN_CD[activePreset]||338.4;
}

function showOriginBar(){
  const bar=document.getElementById('originBar');
  if(bar)bar.style.display='block';
  originCd=getOriginCd();
}

function toggleOrigin(){
  if(originRunning){
    clearInterval(originIv);originRunning=false;
    document.getElementById('originBtn').textContent='재개';
    document.getElementById('originBtn').classList.remove('running');
  } else {
    originRunning=true;
    document.getElementById('originBtn').textContent='정지';
    document.getElementById('originBtn').classList.add('running');
    originStartRef=performance.now()-originMs;
    originIv=setInterval(()=>{
      originMs=performance.now()-originStartRef;
      const total=originCd*1000;
      if(originMs>=total){
        originMs=0;originStartRef=performance.now();
        beep(660,0.15);speak('오리진 쿨 완료');
      }
      updateOriginDisplay();
    },200);
  }
}

function resetOrigin(){
  clearInterval(originIv);originRunning=false;originMs=0;
  document.getElementById('originBtn').textContent='시작';
  document.getElementById('originBtn').classList.remove('running');
  originCd=getOriginCd();
  updateOriginDisplay();
}

function updateOriginDisplay(){
  const remain=Math.max(0,originCd-originMs/1000);
  const el=document.getElementById('originCd');
  const pg=document.getElementById('originPgB');
  if(!el)return;
  const m=Math.floor(remain/60);
  const s=Math.floor(remain%60);
  const totalSec=Math.ceil(remain);
  if(remain>=60){
    el.textContent=`${m}:${String(s).padStart(2,'0')} (${totalSec}s)`;
  } else {
    el.textContent=remain<10?remain.toFixed(1)+'s':totalSec+'s';
  }
  if(pg)pg.style.width=((originMs/1000)/originCd*100)+'%';
}

let activePreset='custom';

function selectPreset(val){
  // Stop timer if running
  if(running){clearInterval(iv);running=false;}
  tMs=0;firedSet.clear();speechSynthesis?.cancel();
  document.getElementById('btnS').textContent='시작';document.getElementById('btnS').className='b b1';document.getElementById('btnS').disabled=false;

  if(val==='custom'){
    activePreset='custom';
    if(savedCustom){buildName=savedCustom.name;phases=JSON.parse(JSON.stringify(savedCustom.phases));}
    else{load();}
  } else {
    if(activePreset==='custom'){savedCustom={name:buildName,phases:JSON.parse(JSON.stringify(phases))};}
    activePreset=val;
    const p=PRESET_DATA[val];
    if(!p){activePreset='custom';load();renderBuild();buildTimerView();return;}
    buildName=p.name;
    phases=JSON.parse(JSON.stringify(p.phases));
    // Apply delay
    const delay=parseFloat(document.getElementById('delayVal').value)||0;
    if(delay>0){phases.forEach(ph=>{ph.duration=ph.duration+delay;});}
  }
  // Update origin cd
  originCd=getOriginCd();
  updateOriginDisplay();
  // Sync both dropdowns
  const ts=document.getElementById('presetSelect');
  const bs=document.getElementById('buildPresetSelect');
  if(ts)ts.value=val;
  if(bs)bs.value=val;
  renderBuild();
  buildTimerView();
}
